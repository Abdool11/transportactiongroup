##############################################################################
# TAG — transportactiongroup.co.za
# nginx reverse proxy configuration
# Place this file at: /etc/nginx/sites-available/transportactiongroup.co.za
# Then: ln -s /etc/nginx/sites-available/transportactiongroup.co.za \
#             /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx
##############################################################################

server {
    listen 80;
    server_name transportactiongroup.co.za www.transportactiongroup.co.za;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name transportactiongroup.co.za www.transportactiongroup.co.za;

    # ── SSL ──────────────────────────────────────────────────────────────────
    # After running: certbot --nginx -d transportactiongroup.co.za -d www.transportactiongroup.co.za
    # Certbot will fill these in automatically. If doing it manually:
    ssl_certificate     /etc/letsencrypt/live/transportactiongroup.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transportactiongroup.co.za/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets (served directly by nginx for performance) ─────────────
    location /_next/static/ {
        alias /home/ubuntu/sites/tag/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        alias /home/ubuntu/sites/tag/public/favicon.ico;
        expires 1y;
    }

    # ── All other requests → Next.js standalone server ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
