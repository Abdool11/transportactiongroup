# ============================================================
# TAG Ecosystem — Nginx Reverse Proxy Configuration
# ============================================================
# Copy this file to /etc/nginx/sites-available/tag-ecosystem
# Then run:
#   sudo ln -s /etc/nginx/sites-available/tag-ecosystem /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# After confirming Nginx is working, run Certbot:
#   sudo certbot --nginx -d transportactiongroup.co.za -d www.transportactiongroup.co.za
#   sudo certbot --nginx -d greenfreightacademy.co.za -d www.greenfreightacademy.co.za
#   sudo certbot --nginx -d betterdriver.co.za -d www.betterdriver.co.za
# ============================================================

# ─── TAG (Port 3000) ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name transportactiongroup.co.za www.transportactiongroup.co.za;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

